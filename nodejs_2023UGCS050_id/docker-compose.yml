version: "7.0"

services:
  frontend:
    build: 
      context: frontend/
      dockerfile: frontend.dockerfile
    container_name: webapp-frontend
    # env_file:
    #   - frontend/.env
    ports:
      - 5173:5173
    
  backend:
    build: 
      context: backend/
      dockerfile: backend.dockerfile
    container_name: webapp-backend
    env_file:
      - backend/.env
    ports:
      - 3000:3000
    depends_on:
      - database
        # condition: service_healthy
  database:
    image: mysql:8.0
    container_name: webapp-database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webapp-db
    volumes:
      - webapp-database:/var/lib/mysql/
    ports:
      - 3306:3306
    # healthcheck:
    #   test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
    #   interval: 5s
    #   retries: 10

volumes:
  webapp-database:

